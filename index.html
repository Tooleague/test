<!DOCTYPE html>
<html>
    <head>
        <title>LeBron</title>
        <style>
            body {
                background-color: #2FA4B2;
                color: #0000FF;
                text-align: center;
                font-family: 'Segoe UI', Arial, sans-serif;
                padding-top: 50px;
            }
            #clickMe {
                background-color: #0000FF;
                color: #000000;
                font-size: 20px;
                padding: 10px 20px;
                border: 5px solid #000000;
                border-radius: 5px;
                cursor: pointer;
            }
            #score, #timer, #gameOver {
                font-size: 28px;
            }
        </style>
    </head>
    <body>
        <p id="timer">Time: </p>
        <p id="score">Score: </p>
        <p id="gameOver"></p>
        <button id="clickMe">Score!</button>
        <button id="reset">Reset</button>
        <script>
            let score = 0
            let scoreDisplay = document.getElementById("score")
            let timerDisplay = document.getElementById("timer")
            let gameOverDisplay = document.getElementById("gameOver")
            let buttonClickMe = document.getElementById("clickMe")
            let buttonReset = document.getElementById("reset")
            let timeLeft = 15
            startTimer()
            function startTimer() {
                countdown = setInterval(function() {
                    timeLeft = timeLeft - 1
                    if (timeLeft <=0) {
                        clearInterval(countdown)
                        alert("Time's up! Your score is: " + score)
                        gameOverDisplay.innerText = "Game Over!"
                    }
                    timerDisplay.innerText = "Time: " + timeLeft
                }, 1000)
            }
            buttonReset.addEventListener("click", function() {
            score = 0
            timeLeft = 15
            clearInterval(countdown)
            scoreDisplay.innerText = "Score: " + score
            timerDisplay.innerText = "Time: " + timeLeft
            gameOverDisplay.innerText = ""
            startTimer()
            })
            buttonClickMe.addEventListener("click", function() {
            if (timeLeft > 0) {
            scoreDisplay.innerText = "Score: " + (score + 1)
            score++
            if (score >= 100) {
                alert("You win!")
            }
            }
            })
        </script>
    </body>
</html>
