<!DOCTYPE html>
<html>
    <head>
        <title>LeBron James Simulator</title>
        <style>
            body {
                background-color: #ff8800;
                color: #000000;
                text-align: center;
                font-family: 'Segoe UI', Impact, sans-serif;
                padding-top: 0px;
            }
            #clickMe {
                background-color: #00FF00;
                color: #000000;
                font-family: 'Segoe UI', Impact, sans-serif;
                font-size: 14px;
                padding: 10px 20px;
                border: 5px solid #000000;
                border-radius: 5px;
                cursor: pointer;
                position: absolute;
                overflow: hidden;
                white-space: nowrap;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #score, #timer, #gameOver {
                font-size: 28px;
            }
            #gameArea {
                position: relative;
                width: 100%;
                height: 500px;
                border: 5px solid #000000;
                margin: 20px auto;
            }
        </style>
    </head>
    <body>
        <p id="timer">Time: </p>
        <p id="score">Score: </p>
        <p id="gameOver"></p>
        <button id="easyBtn">Easy</button>
        <button id="mediumBtn">Medium</button>
        <button id="hardBtn">Hard</button>
        <button id="reset">Reset</button>
        <div id = "gameArea">
            <button id="clickMe">Score!</button>
        </div>
        <script>
            let score = 0
            let scoreDisplay = document.getElementById("score")
            let timerDisplay = document.getElementById("timer")
            let gameOverDisplay = document.getElementById("gameOver")
            let youWinDisplay = document.getElementById("youWin")
            let buttonClickMe = document.getElementById("clickMe")
            let buttonReset = document.getElementById("reset")
            let easyBtn = document.getElementById("easyBtn")
            let mediumBtn = document.getElementById("mediumBtn")
            let hardBtn = document.getElementById("hardBtn")
            let easy = { time:15, size: 100, width: 400, height: 400}
            let medium = { time:10, size: 75, width: 550, height: 550}
            let hard = { time:5, size: 50, width: 700, height: 700}
            let settings = medium
            let timeLeft = settings.time
            let countdown
            function moveButton() {
                let randomX = Math.floor(Math.random() * (gameArea.offsetWidth - settings.size))
                buttonClickMe.style.left = randomX + "px"
                let randomY = Math.floor(Math.random() * (gameArea.offsetHeight - settings.size))
                buttonClickMe.style.top = randomY + "px"
                buttonClickMe.style.width = settings.size + "px"
                buttonClickMe.style.height = settings.size + "px"
            }
            function startTimer() {
                countdown = setInterval(function() {
                    timeLeft = timeLeft - 1
                    if (timeLeft <=0) {
                        clearInterval(countdown)
                        alert("Time's up! Your score is: " + score)
                        gameOverDisplay.innerText = "Game Over!"
                    }
                    timerDisplay.innerText = "Time: " + timeLeft
                }, 1000)
            }
            resetGame()
            function resetGame() {
            score = 0
            timeLeft = settings.time
            clearInterval(countdown)
            scoreDisplay.innerText = "Score: " + score
            timerDisplay.innerText = "Time: " + timeLeft
            gameOverDisplay.innerText = ""
            gameArea.style.width = settings.width + "px"
            gameArea.style.height = settings.height + "px"
            startTimer()
            }
            easyBtn.addEventListener("click", function(event) {
                settings = easy
                alert("DIfficulty: Easy")
                resetGame()
                event.stopPropagation()
            })
            mediumBtn.addEventListener("click", function(event) {
                settings = medium
                alert("DIfficulty: Medium")
                resetGame()
                event.stopPropagation()
            })
            hardBtn.addEventListener("click", function(event) {
                settings = hard
                alert("DIfficulty: Hard")
                resetGame()
                event.stopPropagation()
            })
            buttonReset.addEventListener("click", function(event) {
                resetGame()
                event.stopPropagation()
            })
            buttonClickMe.addEventListener("click", function(event) {
            event.stopPropagation()
            if (timeLeft > 0) {
            scoreDisplay.innerText = "Score: " + (score + 1)
            score++
            moveButton()
            if (score >= 10) {
                alert("You win!")
                clearInterval(countdown)
            }
            }
            })
            document.body.addEventListener("click", function() {
                if (timeLeft > 0) {
                    score = score - 1
                    scoreDisplay.innerText = "Score: " + + score
                }
            })
        </script>
    </body>
</html>
